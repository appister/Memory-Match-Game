<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match Game</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:20px;
    font-size:18px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    background:white;
}

button:hover{
    background:#ddd;
}

select{
    padding:10px;
    border-radius:5px;
    font-size:16px;
}

.game-board{
    width:520px;
    max-width:95vw;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.card{
    aspect-ratio:1;
    cursor:pointer;
    perspective:1000px;
}

.card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform 0.5s;
    transform-style:preserve-3d;
}

.card.flipped .card-inner{
    transform:rotateY(180deg);
}

.card-front,
.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    backface-visibility:hidden;
}

.card-front{
    background:white;
    color:black;
    transform:rotateY(180deg);
}

.card-back{
    background:#0d1b2a;
}

.win-message{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    color:#FFD700;
}
</style>
</head>

<body>

<h1>🧠 Memory Match Game</h1>

<div class="controls">

<label>
Difficulty:
<select id="difficulty">
<option value="8000">Easy (8 sec Preview)</option>
<option value="5000" selected>Medium (5 sec Preview)</option>
<option value="3000">Hard (3 sec Preview)</option>
<option value="1000">Expert (1 sec Preview)</option>
</select>
</label>

<button onclick="startGame()">🔄 Restart Game</button>

</div>

<div class="stats">
<div>Moves: <span id="moves">0</span></div>
<div>Time: <span id="timer">0</span>s</div>
</div>

<div class="game-board" id="board"></div>

<div class="win-message" id="winMessage"></div>

<script>

const emojis = [
'🍎','🍌','🍇','🍉',
'🍒','🥝','🍍','🍓'
];

let cards = [];
let flippedCards = [];
let lockBoard = false;
let moves = 0;
let matchedPairs = 0;
let timer = 0;
let timerInterval;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function previewCards(duration){

    const allCards = document.querySelectorAll('.card');

    allCards.forEach(card=>{
        card.classList.add('flipped');
    });

    lockBoard = true;

    setTimeout(()=>{

        allCards.forEach(card=>{
            card.classList.remove('flipped');
        });

        lockBoard = false;

    },duration);
}

function startGame(){

    clearInterval(timerInterval);

    timer = 0;
    moves = 0;
    matchedPairs = 0;

    document.getElementById("moves").textContent = moves;
    document.getElementById("timer").textContent = timer;
    document.getElementById("winMessage").textContent = "";

    timerInterval = setInterval(()=>{
        timer++;
        document.getElementById("timer").textContent = timer;
    },1000);

    cards = [...emojis,...emojis];

    shuffle(cards);

    const board = document.getElementById("board");

    board.innerHTML = "";

    cards.forEach((emoji,index)=>{

        const card = document.createElement("div");

        card.classList.add("card");

        card.innerHTML = `
            <div class="card-inner">
                <div class="card-front">${emoji}</div>
                <div class="card-back">❓</div>
            </div>
        `;

        card.dataset.emoji = emoji;
        card.dataset.index = index;

        card.addEventListener("click",flipCard);

        board.appendChild(card);

    });

    flippedCards = [];

    const previewTime =
        parseInt(document.getElementById("difficulty").value);

    setTimeout(()=>{
        previewCards(previewTime);
    },300);
}

function flipCard(){

    if(lockBoard) return;

    if(this.classList.contains("flipped")) return;

    this.classList.add("flipped");

    flippedCards.push(this);

    if(flippedCards.length === 2){

        moves++;

        document.getElementById("moves").textContent = moves;

        checkMatch();
    }
}

function checkMatch(){

    const [card1,card2] = flippedCards;

    if(card1.dataset.emoji === card2.dataset.emoji){

        flippedCards = [];

        matchedPairs++;

        if(matchedPairs === emojis.length){

            clearInterval(timerInterval);

            document.getElementById("winMessage").innerHTML =
            `🎉 Congratulations!<br><br>
             You matched all cards.<br>
             Moves: ${moves}<br>
             Time: ${timer} seconds`;
        }

    }else{

        lockBoard = true;

        setTimeout(()=>{

            card1.classList.remove("flipped");
            card2.classList.remove("flipped");

            flippedCards = [];

            lockBoard = false;

        },1000);
    }
}

startGame();

</script>

</body>
</html>
